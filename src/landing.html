<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicknTie - Excel Audit Workpaper Tool</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .landing-page-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: url('public/TicknTie.png') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .landing-container {
            width: 100%;
            max-width: 42rem;
            padding: 3rem;
            border: 2px dashed #d1d5db;
            border-radius: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .landing-container.drag-hover {
            border-color: #5b21b6;
            background: rgba(139, 92, 246, 0.1);
        }

        .title-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .icon {
            font-size: 3.75rem;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #4b5563;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 13rem;
            height: 5rem;
            padding: 0 1.5rem;
            font-size: 1.125rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .action-button.primary {
            background: #6366f1;
            color: white;
            border: 2px solid #6366f1;
        }

        .action-button.primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .action-button.secondary {
            border: 2px solid #6366f1;
            color: #4f46e5;
            background: white;
        }

        .action-button.secondary:hover {
            background: #f3f4f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .footer-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .footer-link {
            color: #4b5563;
            transition: all 0.3s;
            display: inline-block;
            text-decoration: none;
            font-size: 32px;
            line-height: 1;
        }

        .footer-link:hover {
            color: #1f2937;
            transform: scale(1.1);
        }

        .footer-link svg {
            width: 32px;
            height: 32px;
        }

        input[type="file"] {
            display: none;
        }

        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(99, 102, 241, 0.1);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .drag-overlay.active {
            display: flex;
        }

        .drag-message {
            background: white;
            padding: 2rem 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            font-size: 1.5rem;
            color: #4f46e5;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="landing-page-container" class="landing-page-wrapper">
        <div class="landing-container" id="landingContainer">
            <div class="title-section">
                <h2 class="title">
                    <span class="icon">🕵️</span>
                    TicknTie
                </h2>
                <p class="subtitle">Excel Audit Workpaper Tool</p>
            </div>

            <!-- Hidden file input -->
            <input type="file" id="landing-zip-input" accept=".zip">

            <!-- Action buttons -->
            <div class="actions">
                <label for="landing-zip-input" class="action-button primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    Upload Zip Folder
                </label>

                <button class="action-button secondary" onclick="loadSampleData()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    Try Sample Data
                </button>
            </div>

            <!-- Footer links -->
            <div class="footer-links">
                <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="footer-link" title="GitHub Repository">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
                    </svg>
                </a>

                <a href="https://chatgpt.com" target="_blank" rel="noopener noreferrer" class="footer-link" title="Try ChatGPT">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681v6.737zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/>
                    </svg>
                </a>

                <a href="https://scoreboard.audittoolbox.com" target="_blank" rel="noopener noreferrer" class="footer-link" title="View Scoreboard">
                    🏆
                </a>

                <a href="https://audittoolbox.com" target="_blank" rel="noopener noreferrer" class="footer-link" title="Find other audit tools">
                    🧰
                </a>
            </div>
        </div>
    </div>

    <!-- Drag overlay -->
    <div class="drag-overlay" id="dragOverlay">
        <div class="drag-message">
            📦 Drop your ZIP file here
        </div>
    </div>

    <script>
        // Handle file selection
        document.getElementById('landing-zip-input').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                handleZipFile(e.target.files[0]);
            }
        });

        // Handle drag and drop
        const container = document.getElementById('landingContainer');
        const dragOverlay = document.getElementById('dragOverlay');
        let dragCounter = 0;

        document.addEventListener('dragenter', function(e) {
            e.preventDefault();
            dragCounter++;
            if (dragCounter === 1) {
                dragOverlay.classList.add('active');
                container.classList.add('drag-hover');
            }
        });

        document.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                dragOverlay.classList.remove('active');
                container.classList.remove('drag-hover');
            }
        });

        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });

        document.addEventListener('drop', function(e) {
            e.preventDefault();
            dragCounter = 0;
            dragOverlay.classList.remove('active');
            container.classList.remove('drag-hover');

            const files = Array.from(e.dataTransfer.files);
            const zipFile = files.find(f => f.name.endsWith('.zip'));

            if (zipFile) {
                handleZipFile(zipFile);
            } else {
                alert('Please upload a .zip file containing Excel and image files.');
            }
        });

        // Handle zip file processing
        function handleZipFile(file) {
            // Store the file in sessionStorage or pass to main app
            const reader = new FileReader();
            reader.onload = function(e) {
                // Store the file data
                sessionStorage.setItem('pendingZipFile', e.target.result);
                sessionStorage.setItem('pendingZipFileName', file.name);

                // Redirect to main application
                window.location.href = 'index.html';
            };
            reader.readAsDataURL(file);
        }

        // Load sample data
        function loadSampleData() {
            // Create sample Excel data with some demo content
            const sampleData = {
                type: 'sample',
                sheets: [
                    {
                        name: 'Audit Sample',
                        data: [
                            ['Account', 'Description', 'Amount', 'Evidence'],
                            ['1001', 'Cash', '$10,000', 'Bank Statement'],
                            ['2001', 'Accounts Receivable', '$25,000', 'Invoice #123'],
                            ['3001', 'Inventory', '$45,000', 'Count Sheet'],
                            ['4001', 'Fixed Assets', '$100,000', 'Asset Register'],
                            ['', '', '', ''],
                            ['Total Assets', '', '$180,000', '']
                        ]
                    }
                ]
            };

            // Store sample data flag
            sessionStorage.setItem('loadSampleData', JSON.stringify(sampleData));

            // Redirect to main application
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
